<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inmo Studio PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#19202c;--muted:#667085;--panel:#fff;--line:#e8eaf0;--purple:#7357f5;--mint:#31c4b4;--shadow:0 24px 70px rgba(34,42,65,.14)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,Arial,sans-serif;color:var(--ink)}body{min-height:100vh;background:radial-gradient(circle at 14% 5%,#e8e4ff 0,transparent 34%),radial-gradient(circle at 90% 7%,#dffaf5 0,transparent 30%),#f5f6fa;padding:24px}.app{width:min(1180px,100%);margin:auto}.top{height:64px;display:flex;align-items:center;justify-content:space-between}.software-logo{height:48px}.top-note{font-size:12px;font-weight:700;color:#788195;background:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.9);padding:9px 13px;border-radius:999px;backdrop-filter:blur(10px)}
.hero{position:relative;overflow:hidden;min-height:330px;margin-top:16px;padding:52px 50px;border:1px solid rgba(255,255,255,.86);border-radius:30px;background:linear-gradient(125deg,#fff 0%,#f5f1ff 53%,#e9fbf8 100%);box-shadow:var(--shadow)}.hero:before,.hero:after{content:"";position:absolute;border-radius:50%;filter:blur(2px)}.hero:before{width:310px;height:310px;right:-90px;top:-105px;background:linear-gradient(145deg,rgba(115,87,245,.16),rgba(49,196,180,.28))}.hero:after{width:180px;height:180px;right:190px;bottom:-100px;background:rgba(255,207,56,.2)}.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:900;letter-spacing:.13em;text-transform:uppercase;color:#6955d9;background:#eeeaff;padding:8px 11px;border-radius:999px}.eyebrow:before{content:"";width:7px;height:7px;border-radius:50%;background:#7357f5}.hero h1{position:relative;z-index:2;max-width:720px;margin:18px 0 12px;font-size:clamp(38px,5vw,68px);line-height:.98;letter-spacing:-.055em}.hero p{position:relative;z-index:2;max-width:610px;margin:0;color:#697386;font-size:16px;line-height:1.65}.hero-art{position:absolute;z-index:1;right:44px;bottom:26px;width:310px;height:205px}.mini-window{position:absolute;background:#fff;border:1px solid #e4e7ef;border-radius:16px;box-shadow:0 20px 40px rgba(44,51,75,.14)}.mini-window.one{width:230px;height:178px;right:0;bottom:0;padding:13px}.mini-window.two{width:128px;height:105px;left:0;top:0;padding:9px;transform:rotate(-5deg)}.mini-bar{height:12px;border-radius:6px;background:#eef0f5;margin-bottom:10px}.mini-canvas{height:125px;border-radius:10px;background:linear-gradient(145deg,#143a38,#275f5b);position:relative;overflow:hidden}.mini-canvas:after{content:"TIP INMOBILIARIO";position:absolute;left:12px;bottom:16px;background:#67c9bf;color:#fff;font-size:8px;font-weight:900;padding:7px 10px;border-radius:999px}.mini-layers{display:grid;gap:6px}.mini-layers i{display:block;height:13px;border-radius:5px;background:#eff1f5}.mini-layers i:nth-child(2){width:84%;background:#e7e3ff}.mini-layers i:nth-child(3){width:70%;background:#dff7f3}
.section-head{display:flex;align-items:end;justify-content:space-between;margin:34px 4px 15px}.section-head h2{margin:0;font-size:22px;letter-spacing:-.025em}.section-head span{font-size:12px;color:#8490a3}.clients{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.client{position:relative;appearance:none;border:1px solid var(--line);background:rgba(255,255,255,.94);min-height:230px;border-radius:22px;padding:21px;text-align:left;cursor:pointer;box-shadow:0 13px 35px rgba(44,51,75,.08);transition:.2s ease;overflow:hidden}.client:hover{transform:translateY(-5px);box-shadow:0 23px 55px rgba(44,51,75,.16);border-color:transparent}.client:after{content:"→";position:absolute;right:20px;bottom:19px;width:33px;height:33px;display:grid;place-items:center;border-radius:50%;background:#f2f3f7;font-weight:900;transition:.2s}.client:hover:after{transform:translateX(3px);background:var(--client);color:#fff}.client-visual{height:116px;border-radius:15px;display:grid;place-items:center;margin-bottom:16px;overflow:hidden;background:var(--soft)}.client-visual img{max-width:74%;max-height:82%;object-fit:contain}.client-visual .pv{font-family:'Times New Roman',serif;font-size:22px;font-weight:700;color:#714c35;text-align:center}.client-visual .pv small{display:block;font-family:Inter;font-size:7px;letter-spacing:.23em;margin-top:5px}.client h3{margin:0 0 5px;font-size:18px}.client p{margin:0 42px 0 0;color:#7b8495;font-size:11px;line-height:1.45}.lavinia{--client:#5bc4b9;--soft:#eaf9f7}.pierina{--client:#b47b4f;--soft:#f7eee7}.ruby{--client:#eeb72f;--soft:#eff5f8}.ruby .client-visual{background:#183b50}.ruby .client-visual img{max-width:69%}.foot{display:flex;align-items:center;justify-content:center;padding:24px;color:#9aa3b2;font-size:10px}
@media(max-width:900px){.hero{padding:40px 34px}.hero-art{opacity:.35;right:10px}.clients{grid-template-columns:1fr}.client{min-height:190px}.client-visual{height:90px}.section-head span{display:none}}@media(max-width:600px){body{padding:14px}.top-note{display:none}.hero{min-height:305px;padding:35px 25px;border-radius:23px}.hero h1{font-size:42px}.hero p{font-size:14px}.software-logo{width:230px}.hero-art{display:none}}
</style>
</head>
<body>
<main class="app">
<header class="top"><img class="software-logo" src="assets/app/inmo-studio-logo.svg" alt="Inmo Studio PRO"><div class="top-note">Editor inmobiliario por capas</div></header>
<section class="hero">
  <div class="eyebrow">Tu espacio creativo</div>
  <h1>Diseña rápido.<br>Conserva cada marca.</h1>
  <p>Un solo estudio para tus tres clientes, con plantillas maestras, edición visual, páginas, capas y exportación profesional.</p>
  <div class="hero-art" aria-hidden="true"><div class="mini-window two"><div class="mini-bar"></div><div class="mini-layers"><i></i><i></i><i></i><i></i></div></div><div class="mini-window one"><div class="mini-bar"></div><div class="mini-canvas"></div></div></div>
</section>
<div class="section-head"><h2>Selecciona un cliente</h2><span>Entrarás directamente al editor</span></div>
<section class="clients">
<button class="client lavinia" onclick="location.href='editor.html?client=lavinia'"><div class="client-visual" style="background:#20302f"><img src="assets/brand/lavinia-white.png" alt="Lavinia Flores"></div><h3>Lavinia Flores</h3><p>Verde menta, ornamento original y componentes inteligentes.</p></button>
<button class="client pierina" onclick="location.href='editor.html?client=pierina'"><div class="client-visual"><div class="pv">Pierina Vega<small>AGENTE INMOBILIARIO</small></div></div><h3>Pierina Vega</h3><p>Tips, noticias y propiedades con su identidad editorial.</p></button>
<button class="client ruby" onclick="location.href='editor.html?client=ruby'"><div class="client-visual"><img src="assets/brand/lima-houses-color.png" alt="Lima Houses"></div><h3>Ruby · Lima Houses</h3><p>Marca azul y dorada con logo color o blanco.</p></button>
</section>
<div class="foot">INMO STUDIO PRO · Versión 3.0</div>
</main>
</body></html>
