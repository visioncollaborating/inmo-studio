<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lavinia Studio</title><style>
:root{--panel:#172121;--mint:#68c9c0;--bg:#ece9e4;--line:rgba(255,255,255,.13);--danger:#e45d6f}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Avenir Next Arabic","Avenir Next",Arial,sans-serif;background:var(--bg)}button,input,textarea,select{font:inherit}.top{position:fixed;inset:0 0 auto 0;height:58px;background:#101818;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 15px;z-index:5}.group{display:flex;gap:8px;align-items:center}.top button,.btn{border:0;border-radius:10px;padding:10px 12px;font-weight:800;cursor:pointer}.top button{background:rgba(255,255,255,.09);color:#fff;border:1px solid var(--line)}.top .primary,.btn.primary{background:var(--mint);color:#16302e}.app{display:grid;grid-template-columns:410px 1fr;min-height:100vh;padding-top:58px}.panel{height:calc(100vh - 58px);overflow:auto;background:var(--panel);color:#fff;padding:20px}.brand{font-weight:900;font-size:19px;margin-bottom:15px}.brand small{display:block;color:#b8c6c4;font-size:11px;margin-top:3px}.section{border-top:1px solid var(--line);padding-top:15px;margin-top:15px}.section h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cfdbd9;margin:0 0 11px}label{display:block;font-size:12px;font-weight:800;color:#dfe8e6;margin-bottom:10px}input,textarea,select{width:100%;margin-top:5px;padding:9px 10px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:#fff;outline:none}select option{color:#111}textarea{min-height:68px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:9px}.file{border:1px dashed rgba(255,255,255,.25);padding:10px;border-radius:10px;text-align:center;cursor:pointer}.file input{display:none}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.tab{border:1px solid var(--line);background:rgba(255,255,255,.06);color:#fff;border-radius:9px;padding:8px}.tab.active{background:var(--mint);color:#173230}.tab.hidden{display:none}.check{display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.06);padding:9px;border-radius:10px}.check input{width:auto;margin:0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.btn{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line)}.btn.danger{color:#ff9faf;background:rgba(228,93,111,.12)}.workspace{padding:20px}.head{max-width:1050px;margin:auto auto 14px;display:flex;justify-content:space-between;align-items:center}.head h2{margin:0;font-size:18px}.status{background:#fff;border-radius:999px;padding:8px 11px;font-size:12px;color:#69716f}.stage{max-width:1050px;margin:auto;background:#d5d5d1;border-radius:22px;padding:20px;min-height:calc(100vh - 110px);display:grid;place-items:center}.shell{position:relative;box-shadow:0 28px 75px rgba(22,33,33,.23);background:#fff}.shell canvas{display:block}.hint{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.55);color:#fff;padding:6px 9px;border-radius:999px;font-size:10px}@media(max-width:1000px){.app{grid-template-columns:1fr}.panel{height:auto}.top{position:relative}.app{padding-top:0}}
</style></head><body>
<header class="top"><div class="group"><strong>Lavinia Studio</strong><button id="newBtn">Nuevo</button><button id="openBtn">Abrir proyecto</button><button class="primary" id="saveProjectBtn">Guardar proyecto</button><input id="openFile" type="file" accept=".lavinia,.json" hidden></div><div class="group"><button id="topJpg">Exportar JPG</button><button id="topCapcut">Exportar CapCut</button></div></header>
<div class="app"><aside class="panel"><div class="brand">Lavinia Flores <small>Carátula + galería 4:5</small></div>
<section><label>Cantidad de piezas<select id="count"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></label><div class="tabs" id="tabs"><button class="tab active" data-i="0">1</button><button class="tab hidden" data-i="1">2</button><button class="tab hidden" data-i="2">3</button><button class="tab hidden" data-i="3">4</button><button class="tab hidden" data-i="4">5</button></div><p id="pieceHelp" style="font-size:11px;color:#b8c6c4">Pieza 1: carátula completa.</p></section>
<section class="section" id="coverControls"><h3>Contenido de carátula</h3><label>Etiqueta<input id="tag" value="TIP"></label><label>Título<textarea id="title">¡Elegir la ubicación perfecta es el secreto de una gran inversión!</textarea></label><label>Subtítulo<textarea id="subtitle"></textarea></label><label>Posición del bloque<input id="blockY" type="range" min="650" max="1160" value="910"></label><label>Tamaño de título<input id="titleSize" type="range" min="42" max="82" value="56"></label><div class="row"><label>Logo<select id="logoChoice"><option value="white">Blanco</option><option value="black">Negro</option><option value="none">Sin logo</option></select></label><label>Ornamento<select id="cornerChoice"><option value="green">Verde</option><option value="white">Blanco</option></select></label></div><label class="check"><input id="capcut" type="checkbox" checked> Exportar carátula en capas para CapCut</label></section>
<section class="section"><h3>Fotografía de esta pieza</h3><label class="file">Seleccionar imagen<input id="photoFile" type="file" accept="image/*"></label><div class="row"><label>Zoom<input id="zoom" type="range" min="60" max="220" value="100"></label><label>Oscurecer<input id="overlay" type="range" min="0" max="80" value="48"></label></div><div class="row"><label>Horizontal<input id="posX" type="range" min="-100" max="100" value="0"></label><label>Vertical<input id="posY" type="range" min="-100" max="100" value="0"></label></div><button class="btn" id="removePhoto" style="width:100%">Quitar imagen</button></section>
<section class="section"><h3>Colores</h3><div class="row"><label>Verde<input id="mint" type="color" value="#68c9c0"></label><label>Texto<input id="textColor" type="color" value="#ffffff"></label></div></section>
<div class="actions"><button class="btn primary" id="jpgBtn">JPG actual</button><button class="btn" id="allJpgBtn">Todos los JPG</button><button class="btn" id="capcutBtn">Capas CapCut</button><button class="btn danger" id="resetBtn">Restablecer</button></div></aside>
<main class="workspace"><div class="head"><div><h2 id="pieceTitle">Carátula</h2><small>1080 × 1350 px · Avenir Next Arabic</small></div><div class="status" id="status">Listo</div></div><div class="stage"><div class="shell" id="shell"><canvas id="canvas" width="1080" height="1350"></canvas><div class="hint">Instagram 4:5</div></div></div></main></div>

const W=1080,H=1350,canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),shell=document.getElementById('shell');
let current=0,count=1,whiteLogo=null,blackLogo=null;
const blank=()=>({photo:null,tag:'TIP',title:'¡Elegir la ubicación perfecta es el secreto de una gran inversión!',subtitle:'',blockY:910,titleSize:56,logoChoice:'white',cornerChoice:'green',capcut:true,zoom:100,overlay:48,posX:0,posY:0,mint:'#68c9c0',textColor:'#ffffff'});
let pages=[blank(),blank(),blank(),blank(),blank()];
const ids=['tag','title','subtitle','blockY','titleSize','logoChoice','cornerChoice','capcut','zoom','overlay','posX','posY','mint','textColor']; const C={};ids.forEach(id=>C[id]=document.getElementById(id));
function flash(t){const s=document.getElementById('status');s.textContent=t;setTimeout(()=>s.textContent='Listo',1400)}
function imgToData(img){if(!img)return null;const c=document.createElement('canvas');c.width=img.width;c.height=img.height;c.getContext('2d').drawImage(img,0,0);return c.toDataURL('image/jpeg',.92)}
function dataToImg(data){return new Promise(r=>{if(!data)return r(null);const i=new Image();i.onload=()=>r(i);i.src=data})}
function capture(){const p=pages[current];ids.forEach(id=>p[id]=C[id].type==='checkbox'?C[id].checked:C[id].value);return p}
async function apply(i){current=i;const p=pages[i];ids.forEach(id=>{if(C[id].type==='checkbox')C[id].checked=!!p[id];else C[id].value=p[id]});document.getElementById('coverControls').style.display=i===0?'block':'none';document.getElementById('pieceTitle').textContent=i===0?'Carátula':`Imagen ${i+1}`;document.getElementById('pieceHelp').textContent=i===0?'Pieza 1: carátula completa.':'Piezas 2 a 5: solo fotografía.';document.querySelectorAll('.tab').forEach((b,n)=>b.classList.toggle('active',n===i));render()}
function cover(c,img){if(!img){c.fillStyle='#9e9e9e';c.fillRect(0,0,W,H);return}const p=pages[current],z=Number(p.zoom)/100,r=Math.max(W/img.width,H/img.height)*z,dw=img.width*r,dh=img.height*r,x=(W-dw)/2+Number(p.posX)/100*W*.35,y=(H-dh)/2+Number(p.posY)/100*H*.35;c.drawImage(img,x,y,dw,dh)}
function wrap(c,text,x,y,max,line,maxLines){const words=(text||'').split(/\s+/);let l='',ls=[];for(const w of words){const t=l?l+' '+w:w;if(c.measureText(t).width>max&&l){ls.push(l);l=w}else l=t}if(l)ls.push(l);ls.slice(0,maxLines).forEach((s,i)=>c.fillText(s,x,y+i*line))}
function drawPhotoLayer(c,p){cover(c,p.photo);if(current===0){const g=c.createLinearGradient(0,Number(p.blockY)-180,0,H);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${Number(p.overlay)/100})`);c.fillStyle=g;c.fillRect(0,Number(p.blockY)-180,W,H)}}
function drawDecorLayer(c,p){if(current!==0)return;c.strokeStyle=p.cornerChoice==='white'?'#fff':p.mint;c.lineWidth=4;c.globalAlpha=.7;c.beginPath();c.moveTo(820,28);c.lineTo(983,28);c.lineTo(983,52);c.quadraticCurveTo(983,76,1008,76);c.lineTo(1038,76);c.lineTo(1038,246);c.moveTo(820,49);c.lineTo(1013,49);c.lineTo(1013,248);c.stroke();c.globalAlpha=1}
function drawTagLayer(c,p){if(current!==0)return;c.font='900 34px "Avenir Next Arabic","Avenir Next",Arial';const t=(p.tag||'TIP').toUpperCase(),tw=c.measureText(t).width,w=Math.max(260,92+tw+55);c.fillStyle=p.mint;c.beginPath();c.roundRect(-22,Number(p.blockY),Math.min(w,W-20),74,34);c.fill();c.fillStyle='#fff';c.fillText(t,92,Number(p.blockY)+49)}
function drawTextLayer(c,p){if(current!==0)return;const y=Number(p.blockY)+126;c.fillStyle=p.textColor;c.font=`900 ${p.titleSize}px "Avenir Next Arabic","Avenir Next",Arial`;wrap(c,p.title,92,y,900,Number(p.titleSize)*1.35,4);if(p.subtitle){c.font='500 27px "Avenir Next Arabic","Avenir Next",Arial';wrap(c,p.subtitle,92,y+230,860,40,3)}}
function drawLogoLayer(c,p){if(current!==0||p.logoChoice==='none')return;const img=p.logoChoice==='black'?blackLogo:whiteLogo;if(!img)return;const ratio=Math.min(270/img.width,150/img.height);c.drawImage(img,42,42,img.width*ratio,img.height*ratio)}
function compose(target,p,index){const old=current;current=index;const c=target.getContext('2d');c.clearRect(0,0,W,H);drawPhotoLayer(c,p);drawDecorLayer(c,p);drawTagLayer(c,p);drawTextLayer(c,p);drawLogoLayer(c,p);current=old}
function render(){capture();compose(canvas,pages[current],current);fit();autosave()}
function fit(){const scale=Math.min(680/W,740/H,(innerWidth>1000?700:innerWidth-30)/W);canvas.style.width=W*scale+'px';canvas.style.height=H*scale+'px';shell.style.width=W*scale+'px';shell.style.height=H*scale+'px'}
ids.forEach(id=>C[id].addEventListener('input',render));
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{capture();apply(Number(b.dataset.i))});
document.getElementById('count').onchange=e=>{count=Number(e.target.value);document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('hidden',i>=count));if(current>=count)apply(count-1);autosave()};
document.getElementById('photoFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=x=>{const i=new Image();i.onload=()=>{pages[current].photo=i;render()};i.src=x.target.result};r.readAsDataURL(f)};
document.getElementById('removePhoto').onclick=()=>{pages[current].photo=null;render()};
function safe(){return (pages[current].title||`lavinia-${current+1}`).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,45)}
function downloadCanvas(c,name,type='image/jpeg'){const a=document.createElement('a');a.download=name;a.href=c.toDataURL(type,1);a.click()}
document.getElementById('jpgBtn').onclick=()=>{capture();const c=document.createElement('canvas');c.width=W;c.height=H;compose(c,pages[current],current);downloadCanvas(c,safe()+'.jpg')};
document.getElementById('allJpgBtn').onclick=async()=>{capture();for(let i=0;i<count;i++){const c=document.createElement('canvas');c.width=W;c.height=H;compose(c,pages[i],i);downloadCanvas(c,`${String(i+1).padStart(2,'0')}-lavinia.jpg`);await new Promise(r=>setTimeout(r,180))}flash('JPG descargados')};
document.getElementById('capcutBtn').onclick=async()=>{capture();if(!pages[0].capcut){alert('La carátula no está marcada para CapCut.');return}const p=pages[0],layers=[['01-foto.png',drawPhotoLayer],['02-ornamento.png',drawDecorLayer],['03-etiqueta.png',drawTagLayer],['04-texto.png',drawTextLayer],['05-logo.png',drawLogoLayer]];const old=current;current=0;for(const [name,fn] of layers){const c=document.createElement('canvas');c.width=W;c.height=H;fn(c.getContext('2d'),p);downloadCanvas(c,name,'image/png');await new Promise(r=>setTimeout(r,180))}current=old;flash('Capas descargadas')};
function project(){capture();return{version:3,count,current,pages:pages.slice(0,count).map(p=>({...p,photo:imgToData(p.photo)}))}}
function autosave(){try{localStorage.setItem('laviniaStable',JSON.stringify(project()))}catch(e){}}
async function loadProject(s){count=Math.min(5,Math.max(1,s.count||1));pages=[];for(const raw of s.pages||[]){pages.push({...blank(),...raw,photo:await dataToImg(raw.photo)})}while(pages.length<5)pages.push(blank());current=Math.min(count-1,s.current||0);document.getElementById('count').value=count;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('hidden',i>=count));await apply(current);flash('Proyecto abierto')}
document.getElementById('saveProjectBtn').onclick=()=>{const blob=new Blob([JSON.stringify(project())],{type:'application/json'}),a=document.createElement('a');a.download='proyecto-lavinia.lavinia';a.href=URL.createObjectURL(blob);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);flash('Proyecto guardado')};
document.getElementById('openBtn').onclick=()=>document.getElementById('openFile').click();document.getElementById('openFile').onchange=async e=>{try{await loadProject(JSON.parse(await e.target.files[0].text()))}catch(err){alert('No se pudo abrir el proyecto.')}e.target.value=''};
document.getElementById('newBtn').onclick=()=>{if(confirm('¿Crear un proyecto nuevo?')){localStorage.removeItem('laviniaStable');location.reload()}};document.getElementById('resetBtn').onclick=document.getElementById('newBtn').onclick;document.getElementById('topJpg').onclick=()=>document.getElementById('jpgBtn').click();document.getElementById('topCapcut').onclick=()=>document.getElementById('capcutBtn').click();
function preload(){return Promise.all([[WHITE_LOGO,'w'],[BLACK_LOGO,'b']].map(([src,k])=>new Promise(r=>{const i=new Image();i.onload=()=>{if(k==='w')whiteLogo=i;else blackLogo=i;r()};i.src=src})))}
window.addEventListener('resize',fit);preload().then(async()=>{const s=localStorage.getItem('laviniaStable');if(s){try{await loadProject(JSON.parse(s));return}catch(e){}}apply(0)});
</script></body></html>
